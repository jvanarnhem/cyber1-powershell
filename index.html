<!DOCTYPE html>

    <title>PowerShell Access Control Simulator</title>
    <style>
        body {
            background-color: #012456;

            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            overflow-y: auto;
        }
        #terminal {
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-bottom: 20px;
        }
        .error { color: #ff5555; }
        .warning { color: #ffff55; }
        .success { color: #55ff55; }
        .input-line {
            display: flex;
            align-items: flex-start;
        }
        .prompt {
            margin-right: 8px;
            white-space: pre;
        }
        input[type="text"] {
            background-color: transparent;
            color: #eeeeee;
            border: none;
            outline: none;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            flex-grow: 1;
        }
    </style>
</head>
<body>

<span class="warning">Notice: You are logged in as 'StandardUser'.
Type 'help' to view the goals for today's scenarios.
Tip: Use the Up and Down arrow keys to cycle through your command history.</span><br><br>
</div>

<div class="input-line">
    <span class="prompt" id="prompt">PS C:\Users\StandardUser&gt;</span>
    <input type="text" id="cmdInput" autofocus autocomplete="off" spellcheck="false">
</div>

<script>
    // --- OBFUSCATION DECODER ---

    // --- MOCK SYSTEM STATE ---

    let currentPath = ["C:", "Users", "StandardUser"];
    let commandHistory = [];
    let historyIndex = -1;

    const groups = {
        "Administrators": ["Teacher", "SYSTEM", d("ZmxhZ09Ge0V2aWxfSGFja2VyXzk5fQ==")],
        "Users": ["StandardUser"]

    // --- MOCK FILE SYSTEM ---
    const fs = {
        "C:": {

                "Notices.txt": { type: "file", owner: "SYSTEM", acl: { "Users": "R", "Administrators": "F" }, content: d("U1lTVEVNIE5PVElDRToKSWYgeW91IHN1Y2Nlc3NmdWxseSB2ZXJpZmllZCB0aGF0IG9ubHkgQWRtaW5zIGNhbiByZWFkIHRoZSBwb2xpY3kgZmlsZSwgeW91ciBmbGFnIGlzOiBmbGFnT0Z7QWNjZXNzX0RlbmllZF9Jc19BX0ZlYXR1cmV9") },

                }
            },
            "Scripts": {
                type: "dir",
                "backup.ps1": { type: "file", owner: "SYSTEM", acl: { "Users": "F", "Administrators": "F" }, content: d("IyBBdXRvbWF0ZWQgU3lzdGVtIEJhY2t1cAojIFdBUk5JTkcgVlVMTkVSQUJJTElUWTogVGhlIHN0YW5kYXJkICdVc2VycycgZ3JvdXAgaGFzIEZ1bGwgQ29udHJvbCBvdmVyIHRoaXMgc2NyaXB0LgojIGZsYWdPRntMZWFzdF9Qcml2aWxlZ2VfVmlvbGF0ZWR9")}
            },
            "Windows": {
                type: "dir",
                "System32": {
                    type: "dir",
                    "policy.txt": { type: "file", owner: "SYSTEM", acl: { "Administrators": "R", "SYSTEM": "F" }, content: d("Q09ORklERU5USUFMIFNZU1RFTSBQT0xJQ1kuCk5ldmVyIGV4cG9zZSB0aGlzIGZpbGUu") }
                }
            },
            "Users": {
                type: "dir",
                "StandardUser": {
                    type: "dir",
                    "Documents": {
                        type: "dir",
                        "notes.txt": { type: "file", owner: "StandardUser", acl: { "StandardUser": "F" }, content: d("Q2xhc3MgTm90ZXM6ClJlbWVtYmVyLCBhbGlhc2VzIGFyZSBmb3Igc2hvcnRjdXRzLCBidXQgY21kbGV0cyBhcmUgZm9yIHNjcmlwdHMuCmZsYWdPRntDbWRsZXRzX0FyZV9GdW5kYW1lbnRhbH0=") }
                    },
                    "Project": {
                        type: "dir",
                        "launch_codes.txt": { type: "file", owner: "StandardUser", acl: { "SYSTEM": "F" }, content: d("TWlzc2lsZSBDb21tYW5kIERhdGE6CmZsYWdPRntJX0NvbnRyb2xfVGhlX0FDTHN9") }
                    }
                }
            }
        }
    };

    // --- HELPER FUNCTIONS ---
    function print(text, className = "") {
        const term = document.getElementById("terminal");
        const span = document.createElement("span");
        if (className) span.className = className;
        span.textContent = text + "\n";
        term.appendChild(span);
        window.scrollTo(0, document.body.scrollHeight);
    }

    function updatePrompt() {
        document.getElementById("prompt").textContent = `PS ${currentPath.join("\\")}>`;
    }

    function getDirFromPath(pathArr) {
        let curr = fs;
        for (let p of pathArr) curr = curr[p];
        return curr;
    }

    function resolvePath(pathStr) {
        if (!pathStr) return { node: getDirFromPath(currentPath), path: [...currentPath] };
        if (pathStr === "\\" || pathStr === "/") return { node: fs["C:"], path: ["C:"] };
        
        let parts = pathStr.split("\\").filter(p => p !== "");
        if (parts.length === 0) return { node: getDirFromPath(currentPath), path: [...currentPath] };

        let isAbsolute = parts[0].toUpperCase() === "C:";
        let navPath = isAbsolute ? [] : [...currentPath];
        
        if (isAbsolute) {
            navPath.push("C:");
            parts.shift();
        }

        let curr = isAbsolute ? fs["C:"] : getDirFromPath(currentPath);
        
        for (let p of parts) {
            if (p === "..") {
                if (navPath.length > 1) {
                    navPath.pop();
                    curr = getDirFromPath(navPath);
                }
            } else if (p === ".") {
                continue; 
            } else {
                let realKey = Object.keys(curr).find(k => k.toLowerCase() === p.toLowerCase());
                if (realKey) {
                    navPath.push(realKey);
                    curr = curr[realKey];
                } else {
                    return null; 
                }
            }
        }
        return { node: curr, path: navPath };
    }

    function checkPermission(node, requiredPerm) {
        if (groups["Administrators"].includes(currentUser)) return true;
        if (node.acl && (node.acl[currentUser] === "F" || node.acl[currentUser] === requiredPerm)) return true;
        for (let group in groups) {
            if (groups[group].includes(currentUser)) {
                if (node.acl && (node.acl[group] === "F" || node.acl[group] === requiredPerm)) return true;
            }
        }
        return false;
    }

    // --- COMMAND PARSER & HISTORY ---
    document.getElementById("cmdInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            let input = this.value.trim();
            this.value = "";
            print(`PS ${currentPath.join("\\")}> ${input}`);
            if (input) {
                commandHistory.push(input);
                historyIndex = commandHistory.length;
                executeCommand(input);
            }
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                this.value = commandHistory[historyIndex];
            }
        } else if (e.key === "ArrowDown") {
            e.preventDefault();
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++;
                this.value = commandHistory[historyIndex];
            } else {
                historyIndex = commandHistory.length;
                this.value = ""; 
            }
        }
    });

    function executeCommand(input) {
        let args = input.match(/(?:[^\s"]+|"[^"]*")+/g);
        if (!args) return;
        args = args.map(s => s.replace(/"/g, ''));
        let cmd = args.shift().toLowerCase();

        args = args.filter(a => !['-path', '-group', '-password'].includes(a.toLowerCase()));

        const aliases = ['ls', 'cat', 'cd', 'dir', 'echo', 'clear', 'cls'];
        if (aliases.includes(cmd)) {
            print(`Simulator Notice: The term '${cmd}' is an alias. In this class, please practice using the proper PowerShell cmdlet (e.g., Get-ChildItem, Get-Content, Set-Location, Clear-Host).`, "warning");
            return;
        }

        try {
            switch (cmd) {
                case "help":
                    print("Available Cmdlets:\nGet-ChildItem, Get-Content, Set-Location, Get-Location, Get-Acl, Get-LocalUser, Get-LocalGroupMember, icacls, whoami, Clear-Host, Unlock-File\n\nScenarios:\n1. Find the flag hidden in your Documents.\n2. Attempt to read C:\\Windows\\System32\\policy.txt\n3. Check the Administrators group for unauthorized users.\n4. Restore your own read access to C:\\Users\\StandardUser\\Project\\launch_codes.txt\n5. Audit C:\\Scripts\\backup.ps1 for insecure permissions.\n6. Unlock and read C:\\Public\\ActiveDirectory.txt");
                    break;

                case "clear-host":
                    document.getElementById("terminal").innerHTML = "";
                    break;

                case "get-location":
                    print(`\nPath\n----\n${currentPath.join("\\")}\n`);
                    break;

                case "whoami":
                    print(`laptop-sim\\${currentUser.toLowerCase()}`);
                    break;

                case "set-location":
                    if (!args[0]) throw new Error("Set-Location : Missing argument");
                    let resPath = resolvePath(args[0]);
                    if (resPath && resPath.node.type === "dir") {
                        currentPath = resPath.path;
                        updatePrompt();
                    } else {
                        print(`Set-Location : Cannot find path '${args[0]}' because it does not exist.`, "error");
                    }
                    break;

                case "get-childitem":
                    let targetDir = resolvePath(args[0]);
                    if (!targetDir || targetDir.node.type !== "dir") {
                        print(`Get-ChildItem : Cannot find path.`, "error");
                        break;
                    }
                    print(`\n    Directory: ${targetDir.path.join("\\")}\n`);
                    print("Mode                Name");
                    print("----                ----");
                    for (let key in targetDir.node) {
                        if (key === "type" || key === "owner" || key === "acl" || key === "content" || key === "isEncrypted" || key === "password") continue;
                        let mode = targetDir.node[key].type === "dir" ? "d-----" : "-a----";
                        print(`${mode}              ${key}`);
                    }
                    print("");
                    break;

                case "get-content":
                    if (!args[0]) {
                        print("Get-Content : Cannot process command because parameter is missing.", "error");
                        break;
                    }
                    let fileRes = resolvePath(args[0]);
                    if (!fileRes || fileRes.node.type !== "file") {
                        print(`Get-Content : Cannot find path '${args[0]}'.`, "error");
                        break;
                    }
                    if (!checkPermission(fileRes.node, "R")) {
                        print(`Get-Content : Access to the path '${args[0]}' is denied.`, "error");
                        break;
                    } 
                    if (fileRes.node.isEncrypted) {
                        print(`Get-Content : The file '${args[0]}' is encrypted. Use 'Unlock-File <path> <password>' to decrypt it.`, "error");
                        break;
                    }
                    print(fileRes.node.content);
                    break;

                case "unlock-file":
                    if (args.length < 2) { print("Unlock-File : Missing arguments. Expected: Unlock-File <path> <password>", "error"); break; }
                    let encFileRes = resolvePath(args[0]);
                    if (!encFileRes || encFileRes.node.type !== "file") { print("Unlock-File : Cannot find path.", "error"); break; }
                    if (!encFileRes.node.isEncrypted) { print("Unlock-File : File is not encrypted.", "warning"); break; }
                    
                    if (args[1] === encFileRes.node.password) {
                        encFileRes.node.isEncrypted = false;
                        print(`Success: '${args[0]}' has been decrypted. You can now use Get-Content to read it.`, "success");
                    } else {
                        print("Unlock-File : Incorrect password.", "error");
                    }
                    break;

                case "get-acl":
                    if (!args[0]) { print("Get-Acl : Missing path.", "error"); break; }
                    let aclRes = resolvePath(args[0]);
                    if (!aclRes) { print(`Get-Acl : Cannot find path.`, "error"); break; }
                    print(`\n    Directory: ${aclRes.path.slice(0,-1).join("\\")}\n`);
                    print("Path             Owner                 Access");
                    print("----             -----                 ------");
                    let accessStr = Object.entries(aclRes.node.acl || {}).map(([u, p]) => `${u} Allow ${p}`).join(", ");
                    print(`${aclRes.path[aclRes.path.length-1].padEnd(16)} ${aclRes.node.owner.padEnd(21)} ${accessStr}\n`);
                    break;

                case "get-localuser":
                    print("Name                    Enabled  Description");
                    print("----                    -------  -----------");
                    print("StandardUser            True     Standard student account");
                    print("Teacher                 True     Instructor Admin");
                    print("SYSTEM                  True     Built-in system account");
                    print(`${d("ZmxhZ09Ge0V2aWxfSGFja2VyXzk5fQ==")}  True     Suspicious account`);
                    break;

                case "get-localgroupmember":
                    if (!args[0]) { print("Get-LocalGroupMember : Missing argument", "error"); break; }
                    if (args[0].toLowerCase() === "administrators") {
                        print("Name");
                        print("----");
                        groups["Administrators"].forEach(u => print(`LAPTOP-SIM\\${u}`));
                    } else {
                        print("Get-LocalGroupMember : Group not found.", "error");
                    }
                    break;

                case "icacls":
                    if (args.length < 3) { print("Invalid syntax. Expected: icacls <path> /grant <User>:<Perm>", "error"); break; }
                    let icaclsPath = resolvePath(args[0]);
                    if (!icaclsPath) { print("icacls : The system cannot find the file specified.", "error"); break; }
                    
                    if (args[1].toLowerCase() === "/grant") {
                        let permParts = args[2].split(":");
                        if (permParts.length !== 2) { print("Invalid parameter format. Use User:R or User:F", "error"); break; }
                        
                        let targetUserRaw = permParts[0];
                        let perm = permParts[1].toUpperCase();
                        let targetUser = targetUserRaw;
                        
                        const validAccounts = ["StandardUser", "Teacher", "SYSTEM", "Administrators", "Users"];
                        for (let acc of validAccounts) {
                            if (acc.toLowerCase() === targetUserRaw.toLowerCase()) {
                                targetUser = acc;
                                break;
                            }
                        }

                        if (icaclsPath.node.owner === currentUser || groups["Administrators"].includes(currentUser)) {
                            if (!icaclsPath.node.acl) icaclsPath.node.acl = {};
                            icaclsPath.node.acl[targetUser] = perm;
                            print(`processed file: ${args[0]}\nSuccessfully processed 1 files; Failed processing 0 files`);
                        } else {
                            print("Access is denied.", "error");
                        }
                    } else {
                        print("Only /grant is supported in this simulation.", "error");
                    }
                    break;

                default:
                    print(`${cmd} : The term '${cmd}' is not recognized as the name of a cmdlet.`, "error");
            }
        } catch (err) {
            print(err.message, "error");
        }
    }
